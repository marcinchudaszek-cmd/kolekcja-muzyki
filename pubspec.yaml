name: kolekcja_muzyki
description: Zarządzaj swoją kolekcją muzyki - pełny odtwarzacz z dostępem do plików

publish_to: 'none'

version: 1.5.0+26

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_slidable: ^3.0.1
  cached_network_image: ^3.3.1
  
  # Audio
  just_audio: ^0.9.36
  audio_service: ^0.18.15
  on_audio_query: ^2.9.0
  
  # Google Drive backup
  google_sign_in: ^6.2.1
  googleapis: ^13.2.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12
  
  # Baza danych
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Pliki i uprawnienia
  permission_handler: ^11.1.0
  path_provider: ^2.1.2
  file_picker: ^8.0.0
  
  # Skaner kodów
  mobile_scanner: ^4.0.1
  
  # Sieć (okładki, MusicBrainz)
  http: ^1.2.0
  url_launcher: ^6.2.5
  external_app_launcher: ^4.0.0
  
  # Narzędzia
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  equalizer_flutter: ^0.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/


flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_foreground: "assets/icon.png"
  adaptive_icon_background: "#18181b"

